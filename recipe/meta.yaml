{% set name = "pymc" %}
{% set version = "6.0.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: faa38320a2e034fb153cd0ba2f08e204f14ab68938131bfefa94a2fa8b9f99e2

build:
  number: 0
  skip: true  # [py<312]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  ignore_run_exports:
    - numpy
    - libstdcxx-ng

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    - versioneer 0.29
    - toml
  run:
    - python
    - numpy >=1.25.0
    - arviz >=1.1.0,<2.0
    - cachetools >=4.2.1,<7
    - cloudpickle
    - pandas >=0.24.0
    - pytensor >=3.0.2,<3.1
    - scipy >=1.4.1
    - rich >=13.7.1
    - typing-extensions >=3.7.4
    - threadpoolctl >=3.1.0,<4.0.0

test:
  source_files:
    - tests
  imports:
    - pymc
    - pymc.backends
    - pymc.distributions
    - pymc.gp
    - pymc.step_methods
    - pymc.tuning
    - pymc.variational
    - pymc.ode
    - pymc.model_graph
  commands:
    - pip check
    # 6.x PyPI sdist ships a flat tests/ tree (no sampling suite). Run as a module so
    # `from tests.*` imports resolve; ignore modules that need helpers.py/models.py
    # missing from the sdist.
    - python -m pytest --timeout=300 -k "not test_graphviz" --ignore=tests/test_math.py --ignore=tests/test_testing.py -v tests
  requires:
    - pip
    - pytest
    - pytest-timeout
    - cxx-compiler
    - c-compiler

about:
  home: https://www.pymc.io/welcome.html
  license: Apache-2.0 AND MIT
  license_family: OTHER
  license_file: LICENSE
  summary: PyMC - Bayesian Stochastic Modelling in Python
  description: |
    PyMC is a python module that implements Bayesian statistical models and fitting algorithms, including Markov chain
    Monte Carlo. Its flexibility and extensibility make it applicable to a large suite of problems. Along with core
    sampling functionality, PyMC includes methods for summarizing output, plotting, goodness-of-fit and convergence
    diagnostics.
  doc_url: https://www.pymc.io/projects/docs/en/stable/api.html
  dev_url: https://github.com/pymc-devs/pymc

extra:
  recipe-maintainers:
    - fonnesbeck
    - ocefpaf
